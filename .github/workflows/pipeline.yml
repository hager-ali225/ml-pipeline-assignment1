name: ML Pipeline Quick Assignment

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10  # ثابت لتجنب أي مشاكل

      - name: Run quick Python script
        run: |
          echo "==============================="
          echo "Starting Quick Assignment Run"
          echo "==============================="
          
          python - << 'END'
accuracy = 0.92
run_id = "RUN_123456"

print(f"Accuracy: {accuracy}")
print(f"Run ID: {run_id}")

THRESHOLD = 0.85
if accuracy < THRESHOLD:
    print("Model failed ❌")
else:
    print("Model passed ✅")
END

      - name: Mock Docker Build
        run: |
          RUN_ID="RUN_123456"
          echo "Building Docker image for Run ID: $RUN_ID"
          echo "Docker image built successfully ✅"
