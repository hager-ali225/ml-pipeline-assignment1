name: Quick Output

on:
  push:
    branches:
      - main

jobs:
  quick-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Run quick output
        run: python quick_output.py
